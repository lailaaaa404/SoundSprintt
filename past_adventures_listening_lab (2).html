<body class="bg-slate-900 text-slate-100 min-h-screen">

  <div id="root"></div>

  <!-- El código React inicia aquí -->
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    // ==========================================
    // MOTOR DE SONIDOS (Efectos de Gamificación)
    // ==========================================
    class SoundEngine {
      constructor() {
        this.ctx = null;
        this.muted = false;
      }
      init() {
        if (!this.ctx) {
          this.ctx = new (window.AudioContext || window.webkitAudioContext)();
        }
      }
      playClick() {
        if (this.muted) return;
        this.init();
        try {
          const osc = this.ctx.createOscillator();
          const gain = this.ctx.createGain();
          osc.type = 'sine';
          osc.frequency.setValueAtTime(600, this.ctx.currentTime);
          osc.frequency.exponentialRampToValueAtTime(150, this.ctx.currentTime + 0.1);
          gain.gain.setValueAtTime(0.1, this.ctx.currentTime);
          gain.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + 0.1);
          osc.connect(gain);
          gain.connect(this.ctx.destination);
          osc.start();
          osc.stop(this.ctx.currentTime + 0.1);
        } catch (e) {}
      }
      playSuccess() {
        if (this.muted) return;
        this.init();
        try {
          const now = this.ctx.currentTime;
          const notes = [523.25, 659.25, 783.99, 1046.50]; // C5, E5, G5, C6
          notes.forEach((freq, idx) => {
            const osc = this.ctx.createOscillator();
            const gain = this.ctx.createGain();
            osc.type = 'triangle';
            osc.frequency.setValueAtTime(freq, now + idx * 0.08);
            gain.gain.setValueAtTime(0.08, now + idx * 0.08);
            gain.gain.exponentialRampToValueAtTime(0.01, now + idx * 0.08 + 0.15);
            osc.connect(gain);
            gain.connect(this.ctx.destination);
            osc.start(now + idx * 0.08);
            osc.stop(now + idx * 0.08 + 0.15);
          });
        } catch (e) {}
      }
      playFailure() {
        if (this.muted) return;
        this.init();
        try {
          const now = this.ctx.currentTime;
          const osc = this.ctx.createOscillator();
          const gain = this.ctx.createGain();
          osc.type = 'sawtooth';
          osc.frequency.setValueAtTime(220, now);
          osc.frequency.linearRampToValueAtTime(110, now + 0.25);
          gain.gain.setValueAtTime(0.12, now);
          gain.gain.exponentialRampToValueAtTime(0.01, now + 0.25);
          osc.connect(gain);
          gain.connect(this.ctx.destination);
          osc.start();
          osc.stop(now + 0.25);
        } catch (e) {}
      }
      playBadge() {
        if (this.muted) return;
        this.init();
        try {
          const now = this.ctx.currentTime;
          const osc1 = this.ctx.createOscillator();
          const osc2 = this.ctx.createOscillator();
          const gain = this.ctx.createGain();
          osc1.frequency.setValueAtTime(440, now);
          osc1.frequency.exponentialRampToValueAtTime(880, now + 0.3);
          osc2.frequency.setValueAtTime(554.37, now);
          osc2.frequency.exponentialRampToValueAtTime(1108.73, now + 0.3);
          gain.gain.setValueAtTime(0.06, now);
          gain.gain.exponentialRampToValueAtTime(0.001, now + 0.35);
          osc1.connect(gain);
          osc2.connect(gain);
          gain.connect(this.ctx.destination);
          osc1.start();
          osc2.start();
          osc1.stop(now + 0.35);
          osc2.stop(now + 0.35);
        } catch (e) {}
      }
      playFanfare() {
        if (this.muted) return;
        this.init();
        try {
          const now = this.ctx.currentTime;
          const notes = [
            { f: 523.25, d: 0.15 }, // C5
            { f: 523.25, d: 0.15 }, // C5
            { f: 523.25, d: 0.15 }, // C5
            { f: 659.25, d: 0.3 },  // E5
            { f: 587.33, d: 0.15 }, // D5
            { f: 659.25, d: 0.15 }, // E5
            { f: 783.99, d: 0.45 }, // G5
          ];
          let cumulativeTime = now;
          notes.forEach((note) => {
            const osc = this.ctx.createOscillator();
            const gain = this.ctx.createGain();
            osc.type = 'sawtooth';
            osc.frequency.setValueAtTime(note.f, cumulativeTime);
            gain.gain.setValueAtTime(0.05, cumulativeTime);
            gain.gain.exponentialRampToValueAtTime(0.001, cumulativeTime + note.d);
            osc.connect(gain);
            gain.connect(this.ctx.destination);
            osc.start(cumulativeTime);
            osc.stop(cumulativeTime + note.d);
            cumulativeTime += note.d * 0.95;
          });
        } catch (e) {}
      }
    }

    const sfx = new SoundEngine();

    function App() {
      // ==========================================
      // DECLARACIÓN DE ESTADOS
      // ==========================================
      const [deviceView, setDeviceView] = useState('desktop'); // desktop, tablet, mobile
      const [currentScreen, setCurrentScreen] = useState('home'); // home, pre-listening, while-listening, post-listening, dashboard
      const [activeTab, setActiveTab] = useState(1); // sub-activity tabs
      const [muted, setMuted] = useState(false);
      const [highContrast, setHighContrast] = useState(false);
      const [fontSize, setFontSize] = useState('normal'); // small, normal, large

      // Estadísticas e insignias del usuario
      const [userScore, setUserScore] = useState(() => {
        const saved = localStorage.getItem('listening_lab_score');
        return saved ? parseInt(saved, 10) : 0;
      });
      const [unlockedBadges, setUnlockedBadges] = useState(() => {
        const saved = localStorage.getItem('listening_lab_badges');
        return saved ? JSON.parse(saved) : [];
      });
      const [streakCount, setStreakCount] = useState(3);
      const [completedActivities, setCompletedActivities] = useState({});
      const [celebrationBadge, setCelebrationBadge] = useState(null);

      // Estados de Celebración Final
      const [showFinalCelebration, setShowFinalCelebration] = useState(false);
      const [celebrationParticles, setCelebrationParticles] = useState([]);
      const [finalFeedbackData, setFinalFeedbackData] = useState(null);

      // SECCIÓN 1: PRE-LISTENING
      const [matchedVocabulary, setMatchedVocabulary] = useState({});
      const [draggedItem, setDraggedItem] = useState(null);
      const [predictions, setPredictions] = useState({
        sunny: false,
        unexpected: false,
        lost: false,
        animal: false,
      });
      const [predictionsLocked, setPredictionsLocked] = useState(false);

      // SECCIÓN 2: WHILE-LISTENING (Reproducción estricta de Audio.mpeg)
      const [audioSource, setAudioSource] = useState("Audio.mpeg"); // Pista principal de audio local
      const [isPlaying, setIsPlaying] = useState(false);
      const [playbackSpeed, setPlaybackSpeed] = useState(1);
      const [currentTimelineTime, setCurrentTimelineTime] = useState(0);
      const [duration, setDuration] = useState(48); // Duración cargada de Audio.mpeg
      const [keywordsCaught, setKeywordsCaught] = useState({});

      // Desafío de Ordenamiento Cronológico
      const initialTimelineEvents = [
        { id: 'evt-1', text: 'Max went to the mountains.', correctPos: 0 },
        { id: 'evt-2', text: 'It started raining.', correctPos: 1 },
        { id: 'evt-3', text: 'They ran back.', correctPos: 2 },
        { id: 'evt-4', text: 'They entered a café.', correctPos: 3 },
        { id: 'evt-5', text: 'They bought hot chocolate.', correctPos: 4 },
        { id: 'evt-6', text: 'They talked for hours.', correctPos: 5 },
      ];
      const [timelineEvents, setTimelineEvents] = useState(() => {
        return [...initialTimelineEvents].sort(() => Math.random() - 0.5);
      });
      const [timelineFeedback, setTimelineFeedback] = useState(null);

      // Preguntas de Opción Múltiple
      const mcqQuestions = [
        {
          id: 1,
          q: "Where did Max go last weekend?",
          options: ["To a beach resort", "To the mountains", "To a big city", "To a quiet forest"],
          correct: 1,
          selected: null,
        },
        {
          id: 2,
          q: "Why did Max and his brother run back?",
          options: ["Because they saw a bear", "Because they lost their tickets", "Because it started raining", "Because they were cold"],
          correct: 2,
          selected: null,
        },
        {
          id: 3,
          q: "What did they buy?",
          options: ["New rain coats", "A giant hot chocolate", "Sandwiches and coffee", "Souvenirs"],
          correct: 1,
          selected: null,
        },
        {
          id: 4,
          q: "What happened inside the café?",
          options: ["They stayed warm and talked for hours", "They ordered lunch and left", "They got lost inside", "They met their parents"],
          correct: 0,
          selected: null,
        },
        {
          id: 5,
          q: "What advice did Leo give at the end?",
          options: ["Always buy a spare jacket", "It is always best to stay safe and warm", "Don't go to the mountains in autumn", "Check the weather before you go to the mountains"],
          correct: 3,
          selected: null,
        },
      ];
      const [listeningMissionQuestions, setListeningMissionQuestions] = useState(mcqQuestions);

      // SECCIÓN 3: POST-LISTENING
      const [reflectionAnswers, setReflectionAnswers] = useState({
        easy: '',
        difficult: '',
        improve: '',
      });
      const [reflectionFeedback, setReflectionFeedback] = useState({});
      const [reflectingSubmitting, setReflectingSubmitting] = useState(false);

      // Juego de Detective del Lenguaje
      const allWordCards = [
        { text: 'started', type: 'regular' },
        { text: 'talked', type: 'regular' },
        { text: 'went', type: 'irregular' },
        { text: 'bought', type: 'irregular' },
        { text: 'first', type: 'connector' },
        { text: 'suddenly', type: 'connector' },
        { text: 'in the end', type: 'connector' },
      ];
      const [detectivePool, setDetectivePool] = useState(() => [...allWordCards].sort(() => Math.random() - 0.5));
      const [detectiveClassified, setDetectiveClassified] = useState({
        regular: [],
        irregular: [],
        connector: [],
      });

      // Escribe tu Propia Historia
      const [adventureText, setAdventureText] = useState({
        intro: '',
        first: '',
        suddenly: '',
        end: '',
      });
      const [adventureFeedback, setAdventureFeedback] = useState(null);

      // Referencia del tag de Audio HTML5
      const audioRef = useRef(null);

      // ==========================================
      // DEFINICIONES DE DATOS CONSTANTES
      // ==========================================
      const vocabularyList = [
        { id: 'v1', word: 'Last weekend', meaning: 'Refers to a past time', icon: '📅' },
        { id: 'v2', word: 'Mountain', meaning: 'A very high natural elevation of land', icon: '🏔️' },
        { id: 'v3', word: 'Jacket', meaning: 'A piece of clothing worn on the upper body', icon: '🧥' },
        { id: 'v4', word: 'In the end', meaning: 'At the conclusion', icon: '🏁' },
        { id: 'v5', word: 'Go', meaning: 'Went', icon: '🏃‍♂️' },
        { id: 'v6', word: 'Café', meaning: 'A place where people drink coffee and eat snacks', icon: '☕' },
        { id: 'v7', word: 'Lose', meaning: 'Lost', icon: '🗺️' },
        { id: 'v8', word: 'First', meaning: 'The first event', icon: '1️⃣' },
        { id: 'v9', word: 'Suddenly', meaning: 'An unexpected event happened', icon: '⚡' },
        { id: 'v10', word: 'Buy', meaning: 'Bought', icon: '🛍️' },
      ];

      // Diálogos de la transcripción (Mostrados de forma exclusiva en Post-Listening)
      const dialogueLines = [
        { speaker: "Leo", text: "Hi Max! How was your weekend?", style: "Friendly and slow" },
        { speaker: "Max", text: "Oh, hi Leo. Well... I had a very interesting experience last Saturday.", style: "Sighs slightly, speaking slowly" },
        { speaker: "Leo", text: "Really? What happened?", style: "Curious" },
        { speaker: "Max", text: "Last weekend, I went to the mountains with my brother. First, the weather was beautiful, so we started to walk up the mountain. Then, after one hour, it suddenly changed.", style: "Narrating carefully" },
        { speaker: "Leo", text: "Oh no! Did it rain?", style: "Surprised" },
        { speaker: "Max", text: "Yes, it did. It rained a lot! Suddenly, we realized we didn't have our jackets. We lost them in the car!", style: "Disappointed" },
        { speaker: "Leo", text: "That sounds terrible! What did you do?", style: "Worried" },
        { speaker: "Max", text: "Well, the rain didn't stop, so we decided to run back. We didn't see the beautiful view at the top, but in the end, we went to a café and bought a giant hot chocolate.", style: "Laughs softly" },
        { speaker: "Leo", text: "That was a smart choice. I think a warm café is always better than a cold mountain!", style: "Smiling, cheerful" },
        { speaker: "Max", text: "Yes, you are right! After that, we talked for hours in the café and we didn't think about the bad weather anymore.", style: "Smiles, speaking slowly" },
        { speaker: "Leo", text: "That is true. Sometimes, a bad experience can turn into a good memory with a friend or brother.", style: "Thoughtful" },
        { speaker: "Max", text: "Exactly. Finally, we drove back home in the evening, but we didn't feel sad because the hot chocolate was amazing!", style: "Nods in agreement" },
        { speaker: "Leo", text: "I agree! Next time, please check the weather before you go to the mountains.", style: "Laughs gently" }
      ];

      const badgesData = [
        { id: 'b-explorer', title: 'Story Explorer', description: 'Unlock this by matching all pre-listening vocabulary cards perfectly.', icon: '🥉', color: 'border-amber-600 bg-amber-50 text-amber-800' },
        { id: 'b-detective', title: 'Listening Detective', description: 'Get all interactive listening mission MCQs correct on your first try.', icon: '🥈', color: 'border-slate-400 bg-slate-50 text-slate-800' },
        { id: 'b-master', title: 'Narrative Master', description: 'Sort the timeline and classify verbs with flawless accuracy.', icon: '🥇', color: 'border-yellow-400 bg-yellow-50 text-yellow-800' },
        { id: 'b-champion', title: 'A2 Adventure Champion', description: 'Complete the reflection and write your own story with a high grammar rating.', icon: '👑', color: 'border-purple-400 bg-purple-50 text-purple-800' },
      ];

      // ==========================================
      // ESCUCHADORES DE EFECTOS
      // ==========================================
      useEffect(() => {
        localStorage.setItem('listening_lab_score', userScore.toString());
      }, [userScore]);

      useEffect(() => {
        localStorage.setItem('listening_lab_badges', JSON.stringify(unlockedBadges));
      }, [unlockedBadges]);

      useEffect(() => {
        sfx.muted = muted;
      }, [muted]);

      // Sincronizar velocidad de reproducción con Audio nativo
      useEffect(() => {
        if (audioRef.current) {
          audioRef.current.playbackRate = playbackSpeed;
        }
      }, [playbackSpeed, currentScreen]);

      // Controlar estados de reproducción nativa de Audio.mpeg
      useEffect(() => {
        if (!audioRef.current) return;
        if (isPlaying) {
          audioRef.current.play().catch((err) => {
            console.warn("MPEG audio playback blocked or failed.");
            setIsPlaying(false);
          });
        } else {
          audioRef.current.pause();
        }
      }, [isPlaying]);

      // Pausar y resetear audio si cambiamos de pantalla
      useEffect(() => {
        if (currentScreen !== 'while-listening') {
          setIsPlaying(false);
          setCurrentTimelineTime(0);
          if (audioRef.current) {
            audioRef.current.pause();
          }
        }
      }, [currentScreen]);

      // Generar partículas para la ceremonia de finalización
      useEffect(() => {
        if (showFinalCelebration) {
          const generated = Array.from({ length: 125 }).map((_, i) => ({
            id: i,
            x: Math.random() * 100,
            y: Math.random() * 20 + 80,
            color: ['#F59E0B', '#10B981', '#06B6D4', '#4F46E5', '#EC4899', '#8B5CF6'][Math.floor(Math.random() * 6)],
            size: Math.random() * 8 + 4,
            speedY: Math.random() * 4 + 2,
            speedX: Math.random() * 3 - 1.5,
            delay: Math.random() * 1.5,
          }));
          setCelebrationParticles(generated);
        } else {
          setCelebrationParticles([]);
        }
      }, [showFinalCelebration]);

      const handleAudioProgressBarClick = (e) => {
        if (!audioRef.current) return;
        const rect = e.currentTarget.getBoundingClientRect();
        const clickX = e.clientX - rect.left;
        const ratio = clickX / rect.width;
        const targetTime = ratio * duration;
        audioRef.current.currentTime = targetTime;
        setCurrentTimelineTime(targetTime);
      };

      // ==========================================
      // ACCIONES DE GAMIFICACIÓN Y RECOMPENSAS
      // ==========================================
      const addScore = (amount) => {
        setUserScore(prev => prev + amount);
      };

      const unlockBadge = (id) => {
        if (!unlockedBadges.includes(id)) {
          const updated = [...unlockedBadges, id];
          setUnlockedBadges(updated);
          const badge = badgesData.find(b => b.id === id);
          setCelebrationBadge(badge);
          sfx.playBadge();
        }
      };

      // ==========================================
      // EVALUACIONES Y GRADOS ADAPTATIVOS
      // ==========================================
      const handleFinalFinishAndCelebrate = () => {
        sfx.playClick();
        
        const vocabAnswersCount = Object.keys(matchedVocabulary).length;
        const vocabScore = Math.min(100, Math.round((vocabAnswersCount / vocabularyList.length) * 100));

        const mcqCorrectCount = listeningMissionQuestions.filter(q => q.selected === q.correct).length;
        const listeningScore = Math.min(100, Math.round((mcqCorrectCount / listeningMissionQuestions.length) * 100));

        const timelineCorrect = timelineEvents.every((item, idx) => item.correctPos === idx) ? 100 : 50;
        const detectivePoolLeft = detectivePool.length;
        const totalDetectiveCards = allWordCards.length;
        const detectiveScore = Math.min(100, Math.round(((totalDetectiveCards - detectivePoolLeft) / totalDetectiveCards) * 100));
        const grammarScore = Math.round((timelineCorrect + detectiveScore) / 2);

        const writingScore = adventureFeedback ? adventureFeedback.score : 0;

        const overallScore = Math.round((vocabScore + listeningScore + grammarScore + writingScore) / 4);
        const accuracyRate = Math.round((overallScore + vocabScore) / 2);
        const finalCompletionPercentage = totalCompletedPercentage;

        let performanceLevel = "";
        let colorTheme = "";
        let congratulationsMessage = "";

        if (overallScore >= 90) {
          performanceLevel = "🏆 Excellent Performance (90–100%)";
          colorTheme = "from-amber-400 to-yellow-500";
          congratulationsMessage = "Outstanding work! You demonstrated excellent listening comprehension and a strong understanding of narrative tenses. Keep challenging yourself with more English adventures!";
        } else if (overallScore >= 80) {
          performanceLevel = "🥇 Very Good Performance (80–89%)";
          colorTheme = "from-cyan-400 to-blue-500";
          congratulationsMessage = "Great job! You understood most of the story and used narrative language effectively. Keep practicing to become a Narrative Master!";
        } else if (overallScore >= 70) {
          performanceLevel = "🥈 Good Performance (70–79%)";
          colorTheme = "from-emerald-400 to-teal-500";
          congratulationsMessage = "Well done! You are making solid progress. Review the vocabulary and listen to the story again to improve your confidence and accuracy.";
        } else if (overallScore >= 60) {
          performanceLevel = "🥉 Developing Performance (60–69%)";
          colorTheme = "from-orange-400 to-amber-500";
          congratulationsMessage = "Good effort! You completed the lesson successfully. Focus on listening carefully to key details and practicing past tense verbs. Every lesson helps you improve!";
        } else {
          performanceLevel = "🌱 Needs More Practice (Below 60%)";
          colorTheme = "from-rose-400 to-red-500";
          congratulationsMessage = "Don’t give up! Learning English takes practice. Try listening to the story again, review the vocabulary, and complete the activities once more. You’re improving with every attempt!";
        }

        const categoryScoresList = [
          { name: 'Listening', score: listeningScore, recs: ["Listen to the audio one more time at 0.75× speed.", "Pay attention to key words and sequence markers in Section 2."] },
          { name: 'Vocabulary', score: vocabScore, recs: ["Review the vocabulary cards before listening again.", "Practice matching words with their meanings in Section 1."] },
          { name: 'Grammar', score: grammarScore, recs: ["Review regular and irregular past verbs listed in Section 3.", "Practice using connectors such as 'First', 'Suddenly', and 'In the end' to write transition sentences."] },
          { name: 'Writing', score: writingScore, recs: ["Try writing another short story using the provided template.", "Check your past tense verbs before submitting the story."] }
        ];

        categoryScoresList.sort((a, b) => a.score - b.score);
        const weakestCategory = categoryScoresList[0];
        const secondWeakestCategory = categoryScoresList[1];

        const customizedRecommendations = [
          ...weakestCategory.recs,
          secondWeakestCategory.recs[0]
        ];

        sfx.playFanfare();
        setFinalFeedbackData({
          overallScore,
          listeningScore,
          vocabScore,
          grammarScore,
          writingScore,
          accuracyRate,
          finalCompletionPercentage,
          performanceLevel,
          colorTheme,
          congratulationsMessage,
          recommendations: customizedRecommendations
        });

        localStorage.setItem('listening_lab_score', (userScore + 50).toString());
        addScore(50); // XP Completion rewards

        setShowFinalCelebration(true);
      };

      // ==========================================
      // ACCIONES INTERACTIVAS DE ACTIVIDADES
      // ==========================================
      const handleVocabMatch = (word, definition) => {
        const vocab = vocabularyList.find(v => v.word === word);
        if (vocab && vocab.meaning === definition) {
          setMatchedVocabulary(prev => {
            const next = { ...prev, [word]: true };
            sfx.playSuccess();
            addScore(10);
            
            if (Object.keys(next).length === vocabularyList.length) {
              unlockBadge('b-explorer');
              setCompletedActivities(curr => ({ ...curr, vocab: true }));
            }
            return next;
          });
        } else {
          sfx.playFailure();
        }
      };

      const handleTimelineShift = (index, dir) => {
        sfx.playClick();
        const updated = [...timelineEvents];
        const targetIdx = index + dir;
        if (targetIdx >= 0 && targetIdx < updated.length) {
          const temp = updated[index];
          updated[index] = updated[targetIdx];
          updated[targetIdx] = temp;
          setTimelineEvents(updated);
        }
      };

      const verifyTimeline = () => {
        const isCorrect = timelineEvents.every((item, idx) => item.correctPos === idx);

        sfx.playClick();
        setListeningMissionQuestions(prev => {
          const updated = prev.map(q => q.id === qId ? { ...q, selected: optionIdx } : q);

            addScore(20);

          const allDone = updated.every(q => q.selected !== null);
          if (allDone) {

            const allPerfect = updated.every(q => q.selected === q.correct);
            if (allPerfect) {

            }
          }
          return updated;
        });

        sfx.playSuccess();

          addScore(15);
          return updated;

          const MathScoreEvaluatorResult = {};
          let totalPassed = true;

          Object.keys(reflectionAnswers).forEach(key => {
            const text = reflectionAnswers[key].trim();
            const wordCount = text.split(/\s+/).filter(w => w.length > 0).length;
            
            if (wordCount < 30 || wordCount > 50) {
              MathScoreEvaluatorResult[key] = {
                success: false,
                feedback: `Your response has ${wordCount} words. Please keep it within the 30 to 50 words boundary.`,
                score: 40
              };
              totalPassed = false;
            } else {
              const hasPastMistake = /go\s|lose\s|started\snot/i.test(text);
              const feedbackText = hasPastMistake 
                ? "Great job! Your ideas are clear. Remember to use the past tense after 'Last weekend' (e.g., 'went' or 'lost')."
                : "Excellent work! Clear syntax, appropriate narrative connectors, and accurate past simple verbs.";
              
              MathScoreEvaluatorResult[key] = {
                success: true,
                feedback: feedbackText,
                score: hasPastMistake ? 75 : 95
              };
            }
          });

          setReflectionFeedback(MathScoreEvaluatorResult);
          setReflectingSubmitting(false);
          
          if (totalPassed) {

            setCompletedActivities(curr => ({ ...curr, reflection: true }));
            checkChampionBadge();

                                </div>
                              </div>
                              <span className="text-[10px] text-slate-500 italic mt-4 block text-center">Tap / Drop cards here</span>
                            </div>

                            {/* Target: Narrative Connectors */}
                            <div
                              onClick={() => {
                                if (draggedItem) {
                                  classifyDetective(draggedItem, 'connector');
                                  setDraggedItem(null);
                                }
                              }}
                              className="bg-slate-800/80 p-4 rounded-xl border-2 border-dashed border-slate-700 hover:border-indigo-500 transition cursor-pointer min-h-[140px] flex flex-col justify-between"
                            >
                              <div>
                                <span className="text-[10px] tracking-wider uppercase font-bold text-amber-400">Narrative Connectors</span>
                                <div className="flex flex-wrap gap-1.5 mt-2">
                                  {detectiveClassified.connector.map(item => (
                                    <span key={item} className="bg-emerald-500/10 border border-emerald-500/30 text-emerald-300 px-2 py-0.5 rounded text-xs">
                                      {item}
                                    </span>
                                  ))}
                                </div>
                              </div>
                              <span className="text-[10px] text-slate-500 italic mt-4 block text-center">Tap / Drop cards here</span>
                            </div>
                          </div>
                        </div>
                      )}

                      {/* Task 3: Create Your Own Adventure */}
                      {activeTab === 3 && (
                        <div className="space-y-4 text-left">
                          <div className="bg-slate-800 p-4 rounded-xl border border-slate-700">
                            <h4 className="text-xs font-bold text-slate-200 uppercase tracking-wide">Write Your Own Mini Mountain Expedition</h4>
                            <p className="text-[10px] text-slate-400 mt-0.5">Fill in the story blanks using the target past-tense grammar features evaluated by the platform.</p>
                          </div>

                          <div className="space-y-3 bg-slate-950 p-4 rounded-xl border border-slate-800">
                            {/* Sentence 1 */}
                            <div className="flex flex-wrap items-center gap-2">
                              <span className="text-xs text-slate-300 font-bold whitespace-nowrap">Last weekend, I</span>
                              <input
                                type="text"
                                placeholder="e.g. went hiking up the mountain cliffs"
                                value={adventureText.intro}
                                onChange={(e) => setAdventureText(p => ({ ...p, intro: e.target.value }))}
                                className="bg-slate-900 border border-slate-700 rounded p-1.5 text-xs text-slate-200 grow focus:border-indigo-500 outline-none"
                              />
                            </div>

                            {/* Sentence 2 */}
                            <div className="flex flex-wrap items-center gap-2">
                              <span className="text-xs text-slate-300 font-bold whitespace-nowrap">First, I</span>
                              <input
                                type="text"
                                placeholder="e.g. checked the coordinates and wore my heavy coat"
                                value={adventureText.first}
                                onChange={(e) => setAdventureText(p => ({ ...p, first: e.target.value }))}
                                className="bg-slate-900 border border-slate-700 rounded p-1.5 text-xs text-slate-200 grow focus:border-indigo-500 outline-none"
                              />
                            </div>

                            {/* Sentence 3 */}
                            <div className="flex flex-wrap items-center gap-2">
                              <span className="text-xs text-slate-300 font-bold whitespace-nowrap">Suddenly,</span>
                              <input
                                type="text"
                                placeholder="e.g. a strong wind blew and it started snowing intensely"
                                value={adventureText.suddenly}
                                onChange={(e) => setAdventureText(p => ({ ...p, suddenly: e.target.value }))}
                                className="bg-slate-900 border border-slate-700 rounded p-1.5 text-xs text-slate-200 grow focus:border-indigo-500 outline-none"
                              />
                            </div>

                            {/* Sentence 4 */}
                            <div className="flex flex-wrap items-center gap-2">
                              <span className="text-xs text-slate-300 font-bold whitespace-nowrap">In the end,</span>
                              <input
                                type="text"
                                placeholder="e.g. we entered a secure warm lodge and felt better"
                                value={adventureText.end}
                                onChange={(e) => setAdventureText(p => ({ ...p, end: e.target.value }))}
                                className="bg-slate-900 border border-slate-700 rounded p-1.5 text-xs text-slate-200 grow focus:border-indigo-500 outline-none"
                              />
                            </div>
                          </div>

                          <button
                            onClick={handleEvaluateAdventure}
                            className="w-full bg-emerald-600 hover:bg-emerald-500 text-white font-bold py-2.5 rounded-lg text-xs transition"
                          >
                            ⚡ Run Advanced Syntax & Connector Review
                          </button>

                          {adventureFeedback && (
                            <div className={`p-4 rounded-xl border text-xs space-y-1.5 ${adventureFeedback.status === 'success' ? 'bg-indigo-950/40 border-indigo-500/40 text-slate-200' : 'bg-rose-950/40 border-rose-500/40 text-rose-300'}`}>
                              <div className="flex justify-between font-bold">
                                <span>Analysis Output:</span>
                                <span>Grammar Rating Score: {adventureFeedback.score}%</span>
                              </div>
                              <p>{adventureFeedback.message}</p>
                            </div>
                          )}
                        </div>
                      )}

                      {/* PROMINENT FINISH AND RESULTS NAVIGATION BUTTON */}
                      <div className="bg-slate-800 p-5 rounded-2xl border border-indigo-500/40 mt-8 text-center space-y-3 shadow-xl">
                        <span className="text-3xl animate-bounce block">✨</span>
                        <h4 className="text-sm font-black text-white">All Narrative Adventures Fully Handled?</h4>
                        <p className="text-xs text-slate-400">Calculate your grades, check grammar parameters, and unlock adventure ranks.</p>
                        <button
                          onClick={handleFinalFinishAndCelebrate}
                          className="w-full md:w-auto px-10 py-4 bg-gradient-to-r from-emerald-500 via-teal-500 to-cyan-500 hover:from-emerald-400 hover:to-cyan-400 text-white font-extrabold rounded-2xl text-sm tracking-wide shadow-2xl transition transform hover:scale-105 active:scale-95"
                        >
                          🎉 Finish Lesson & View My Results
                        </button>
                      </div>

                      <div className="flex justify-between items-center pt-2">
                        <button 
                          onClick={() => { sfx.playClick(); setCurrentScreen('while-listening'); }}
                          className="px-4 py-2 bg-slate-800 hover:bg-slate-750 text-slate-300 rounded-lg text-xs"
                        >
                          ← Section 2: While-Listening
                        </button>
                      </div>
                    </div>
                  )}

                  {/* SCREEN: DASHBOARD */}
                  {currentScreen === 'dashboard' && (
                    <div className="animate-fadeIn space-y-6">
                      
                      {/* METRIC BOXES GRID */}
                      <div className="grid grid-cols-2 md:grid-cols-4 gap-3">
                        <div className="bg-slate-800 p-4 rounded-2xl border border-slate-700 text-center">
                          <span className="text-slate-400 text-[10px] uppercase font-bold tracking-wider block mb-1">XP Balance</span>
                          <span className="text-2xl font-black text-indigo-400">{userScore} XP</span>
                        </div>

                        <div className="bg-slate-800 p-4 rounded-2xl border border-slate-700 text-center">
                          <span className="text-slate-400 text-[10px] uppercase font-bold tracking-wider block mb-1">Badges Earned</span>
                          <span className="text-2xl font-black text-cyan-400">{unlockedBadges.length} / 4</span>
                        </div>

                        <div className="bg-slate-800 p-4 rounded-2xl border border-slate-700 text-center">
                          <span className="text-slate-400 text-[10px] uppercase font-bold tracking-wider block mb-1">Level Streak</span>
                          <span className="text-2xl font-black text-amber-400">🔥 {streakCount} Days</span>
                        </div>

                        <div className="bg-slate-800 p-4 rounded-2xl border border-slate-700 text-center">
                          <span className="text-slate-400 text-[10px] uppercase font-bold tracking-wider block mb-1">Progress Rate</span>
                          <span className="text-2xl font-black text-emerald-400">{totalCompletedPercentage}%</span>
                        </div>
                      </div>

                      {/* ADVENTURE BADGES EARNED SHOWCASE */}
                      <div className="bg-slate-800/80 p-5 rounded-2xl border border-slate-700 space-y-4 text-left">
                        <h4 className="text-xs font-bold text-slate-200 uppercase tracking-widest">Adventure Badges Status</h4>
                        <div className="grid grid-cols-1 sm:grid-cols-2 gap-3">
                          {badgesData.map(badge => {
                            const isUnlocked = unlockedBadges.includes(badge.id);
                            return (
                              <div 
                                key={badge.id}
                                className={`p-3.5 rounded-xl border flex items-start gap-3 transition-all ${
                                  isUnlocked 
                                    ? `${badge.color} shadow-md`
                                    : 'bg-slate-900/60 border-slate-800/50 opacity-40'
                                }`}
                              >
                                <span className="text-3xl">{badge.icon}</span>
                                <div>
                                  <h5 className="font-bold text-xs">{badge.title}</h5>
                                  <p className="text-[10px] mt-0.5 leading-relaxed">{badge.description}</p>
                                  <span className="text-[9px] uppercase tracking-wider font-extrabold mt-1.5 inline-block">
                                    {isUnlocked ? '✓ Unlocked' : '🔒 Locked'}
                                  </span>
                                </div>
                              </div>
                            );
                          })}
                        </div>
                      </div>

                      {/* RESET UTILITY ACTION */}
                      <div className="text-center pt-4">
                        <button
                          onClick={() => {
                            sfx.playClick();
                            if (confirm('Are you sure you want to reset all progress and start fresh?')) {
                              setUserScore(0);
                              setUnlockedBadges([]);
                              setCompletedActivities({});
                              setMatchedVocabulary({});
                              setPredictions({
                                sunny: false,
                                unexpected: false,
                                lost: false,
                                animal: false,
                              });
                              setPredictionsLocked(false);
                              setKeywordsCaught({});
                              setTimelineEvents([...initialTimelineEvents].sort(() => Math.random() - 0.5));
                              setTimelineFeedback(null);
                              setListeningMissionQuestions(mcqQuestions);
                              setReflectionAnswers({ easy: '', difficult: '', improve: '' });
                              setReflectionFeedback({});
                              setDetectivePool([...allWordCards].sort(() => Math.random() - 0.5));
                              setDetectiveClassified({ regular: [], irregular: [], connector: [] });
                              setAdventureText({ intro: '', first: '', suddenly: '', end: '' });
                              setAdventureFeedback(null);
                              setCurrentScreen('home');
                            }
                          }}
                          className="px-4 py-2 bg-rose-950 hover:bg-rose-900 border border-rose-500/20 text-rose-300 rounded-lg text-xs"
                        >
                          🔄 Reset Course Progress
                        </button>
                      </div>
                    </div>
                  )}

                  {/* CELEBRATION MODAL WITH ADAPTIVE RATINGS */}
                  {showFinalCelebration && finalFeedbackData && (
                    <div className="fixed inset-0 bg-slate-950/95 backdrop-blur-md z-50 flex items-center justify-center p-4 overflow-y-auto animate-fadeIn">
                      <div className="bg-slate-900 border-2 border-indigo-500 max-w-lg w-full rounded-2xl p-6 text-center shadow-2xl relative animate-scaleUp my-8 text-white">
                        
                        {/* Floating badge */}
                        <div className="text-6xl mb-3 animate-bounce">🏆</div>
                        
                        {/* Performance banner */}
                        <div className={`inline-block bg-gradient-to-r ${finalFeedbackData.colorTheme} text-slate-950 font-black px-4 py-1.5 rounded-full text-xs tracking-wider uppercase mb-3`}>
                          {finalFeedbackData.performanceLevel}
                        </div>

                        <h3 className="text-xl font-black">Past Adventures Laboratory Complete</h3>
                        
                        {/* Adaptive Feedback */}
                        <p className="text-xs text-slate-300 mt-3 leading-relaxed bg-slate-950/60 p-3 rounded-xl border border-slate-800">
                      🎉 Congratulations! You have successfully completed the “Past Adventures Listening Lab.” {finalFeedbackData.congratulationsMessage}
                        </p>

                        {/* Breakdown Scores */}
                        <div className="grid grid-cols-2 gap-2 mt-4 text-left">
                          <div className="bg-slate-950/80 p-2.5 rounded-xl border border-slate-800">
                            <span className="text-[9px] text-slate-400 block font-bold">TOTAL SCORE:</span>
                            <span className="text-sm font-black text-indigo-400">{finalFeedbackData.overallScore}%</span>
                          </div>
                          <div className="bg-slate-950/80 p-2.5 rounded-xl border border-slate-800">
                            <span className="text-[9px] text-slate-400 block font-bold">LISTENING RANK:</span>
                            <span className="text-sm font-black text-cyan-400">{finalFeedbackData.listeningScore}%</span>
                          </div>
                          <div className="bg-slate-950/80 p-2.5 rounded-xl border border-slate-800">
                            <span className="text-[9px] text-slate-400 block font-bold">VOCAB COMPLIANCE:</span>
                            <span className="text-sm font-black text-amber-400">{finalFeedbackData.vocabScore}%</span>
                          </div>
                          <div className="bg-slate-950/80 p-2.5 rounded-xl border border-slate-800">
                            <span className="text-[9px] text-slate-400 block font-bold">GRAMMAR & NARRATIVE:</span>
                            <span className="text-sm font-black text-emerald-400">{finalFeedbackData.grammarScore}%</span>
                          </div>
                          <div className="bg-slate-950/80 p-2.5 rounded-xl border border-slate-800">
                            <span className="text-[9px] text-slate-400 block font-bold">WRITING ACCURACY:</span>
                            <span className="text-sm font-black text-purple-400">{finalFeedbackData.writingScore}%</span>
                          </div>
                          <div className="bg-slate-950/80 p-2.5 rounded-xl border border-slate-800">
                            <span className="text-[9px] text-slate-400 block font-bold">COMPLETION RATE:</span>
                            <span className="text-sm font-black text-pink-400">{finalFeedbackData.finalCompletionPercentage}%</span>
                          </div>
                        </div>

                        {/* Recommendations */}
                        <div className="mt-4 bg-indigo-950/20 p-4 rounded-xl border border-indigo-500/20 text-left">
                          <h4 className="text-[10px] font-black text-indigo-300 uppercase tracking-widest mb-1.5 flex items-center gap-1">
                            <span>💡</span> Tailored Recommendations for You:
                          </h4>
                          <ul className="space-y-1.5 list-disc list-inside text-xs text-slate-300">
                            {finalFeedbackData.recs ? finalFeedbackData.recs.map((rec, i) => (
                              <li key={i} className="leading-relaxed">{rec}</li>
                            )) : finalFeedbackData.recommendations.map((rec, i) => (
                              <li key={i} className="leading-relaxed">{rec}</li>
                            ))}
                          </ul>
                        </div>

                        <button
                          onClick={() => {
                            sfx.playClick();
                            setShowFinalCelebration(false);
                            setCurrentScreen('dashboard');
                          }}
                          className="mt-6 w-full bg-gradient-to-r from-indigo-500 to-cyan-500 hover:from-indigo-600 hover:to-cyan-600 text-slate-950 font-black py-3 rounded-xl text-xs transition"
                        >
                          🚀 Return to Dashboard Summary
                        </button>
                      </div>
                    </div>
                  )}

                  {/* CELEBRATION BADGE MODAL / OVERLAY */}
                  {celebrationBadge && (
                    <div className="fixed inset-0 bg-slate-950/80 backdrop-blur-sm z-50 flex items-center justify-center p-4">
                      <div className="bg-slate-900 border-2 border-indigo-500 max-w-sm w-full rounded-2xl p-6 text-center shadow-2xl relative animate-scaleUp text-white">
                        <div className="text-6xl mb-4 animate-bounce">{celebrationBadge.icon}</div>
                        <span className="text-[10px] font-extrabold uppercase tracking-widest text-indigo-400">Badge Earned!</span>
                        <h3 className="text-xl font-black mt-1">{celebrationBadge.title}</h3>
                        <p className="text-xs text-slate-300 mt-2 leading-relaxed">{celebrationBadge.description}</p>
                        
                        <button
                          onClick={() => {
                            sfx.playClick();
                            setCelebrationBadge(null);
                          }}
                          className="mt-6 w-full bg-gradient-to-r from-indigo-500 to-cyan-500 hover:from-indigo-600 hover:to-cyan-600 text-slate-950 font-black py-2 rounded-lg text-xs transition"
                        >
                          Awesome! Continue Adventure
                        </button>
                      </div>
                    </div>
                  )}

                </div>
              </div>
            </div>
          </div>
        </div>
      );
    }

    const container = document.getElementById('root');
    const root = ReactDOM.createRoot(container);
    root.render(<App />);
  </script>
</body>
</html>
